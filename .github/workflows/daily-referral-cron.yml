name: Daily referral cron

# Runs every day at 00:00 UTC and pokes the backend's
# /api/cron/approve-vested endpoint. That endpoint:
#   - advances referrals from 'paid' → 'confirmed' once vesting passes
#   - flags suspicious referrers (>5 signups / 24h)
#
# Auth via the CRON_SECRET repository secret — must match CRON_SECRET on
# the Render web service or the request is rejected.

on:
  schedule:
    - cron: '0 0 * * *'
  # Lets me trigger manually from the Actions tab for testing.
  workflow_dispatch:

jobs:
  poke:
    # This repo is mirrored to a second GitHub account for Vercel
    # deployments — only the primary origin should run the cron to avoid
    # double-triggering. Scope the job to the canonical repo.
    if: github.repository == 'EljoSh-WhiteDesk/JobHunter'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call /api/cron/approve-vested
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set"
            exit 1
          fi
          # --fail makes curl exit non-zero on 4xx/5xx so a bad response
          # actually fails the Actions run and shows up in notifications.
          curl --fail -sS -X POST \
            -H "X-Cron-Key: $CRON_SECRET" \
            https://jobhunter-r46b.onrender.com/api/cron/approve-vested
